# MBASIC Test Configuration
# Example configuration file for testing MBASIC with test suite

# Program to run
program = com/mbasic.com

# Map all .BAS files from test directory as text files
# These files already have CP/M line endings (\r\n)
*.BAS = /home/wohl/cl/mbasic/tests/*.bas text

# Map classic games
STARTREK.BAS = /home/wohl/cl/mbasic/superstartrek.bas text
TRAND.BAS = /home/wohl/cl/mbasic/com/trand.bas text

# Map library files by category
# Business applications
BUDGET.BAS = /home/wohl/cl/mbasic/site-dev/library/business/budget.bas text
FINANCE.BAS = /home/wohl/cl/mbasic/site-dev/library/business/finance.bas text
MORTGAGE.BAS = /home/wohl/cl/mbasic/site-dev/library/business/mortgage.bas text

# Utilities
SORT.BAS = /home/wohl/cl/mbasic/site-dev/library/utilities/sort.bas text
CONVERT.BAS = /home/wohl/cl/mbasic/site-dev/library/utilities/convert.bas text

# Default settings
default_mode = text      # Assume text unless specified
debug = false           # Set to true for verbose output
eol_convert = false     # Files already have \r\n, no conversion needed
eof_marker = true       # Handle ^Z as EOF in text files

# Drive mappings (optional)
drive_A = .
drive_B = /home/wohl/cl/mbasic/tests

# Command line arguments
# If .cfg is used, these can override command line
# args = TEST.BAS
